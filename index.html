<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Fiber Loss Calculator v1
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="header">

<h1>
FIBER LOSS CALCULATOR
</h1>

<p>
KTMB System
</p>

</div>

<div class="dashboard">

<div class="kpi">

<h3>DISTANCE</h3>

<h2 id="distanceKPI">
0 km
</h2>

</div>

<div class="kpi">

<h3>TOTAL LOSS</h3>

<h2 id="lossKPI">
0 dB
</h2>

</div>

<div class="kpi">

<h3>MARGIN</h3>

<h2 id="marginKPI">
0 dB
</h2>

</div>

<div class="kpi">

<h3>STATUS</h3>

<h2 id="statusKPI">
READY
</h2>

</div>

</div>

<div class="card">

<h2>LINK INFORMATION</h2>

<label>
Distance (km)
</label>

<input
type="number"
id="distance">

<label>
Fiber Loss (dB/km)
</label>

<input
type="number"
id="attenuation"
value="0.35">

<label>
Connector Qty
</label>

<input
type="number"
id="connector">

<label>
Splice Qty
</label>

<input
type="number"
id="splice">

<label>
System Margin (dB)
</label>

<input
type="number"
id="margin"
value="3">

<button onclick="calculate()">

CALCULATE

</button>

</div>

<div class="result">

<h2>
CALCULATION RESULT
</h2>

<p id="fiberLoss">
Fiber Loss : 0 dB
</p>

<p id="connectorLoss">
Connector Loss : 0 dB
</p>

<p id="spliceLoss">
Splice Loss : 0 dB
</p>

<p id="totalLoss">
Total Loss : 0 dB
</p>

</div>

<script src="script.js">

</script>

</body>

</html>
